services:
  database:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: trip_requests
      POSTGRES_USER: trip_requests
      POSTGRES_PASSWORD: trip_requests_password
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U trip_requests -d trip_requests']
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 5s
    restart: unless-stopped

volumes:
  postgres_data:
